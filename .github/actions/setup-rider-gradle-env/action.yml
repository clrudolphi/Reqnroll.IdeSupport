# Shared setup for the two build-rider-plugin.yml jobs that run Gradle against src/Rider
# (build-rider-plugin, test-rider-plugin) — JDK + Gradle cache were previously copy-pasted
# identically into both, which risked one getting updated without the other.
name: Setup JDK and Gradle cache for the Rider plugin
description: Installs JDK 21 and restores the Gradle cache for src/Rider builds.

runs:
  using: composite
  steps:
    - name: Setup JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('src/Rider/**/*.gradle.kts', 'src/Rider/gradle.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-
