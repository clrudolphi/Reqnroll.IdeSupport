# ---------------------------------------------------------------------------
# build-rider-plugin.yml — CI pipeline for the Reqnroll Rider plugin.
#
# Kotlin-only IntelliJ Platform plugin (src/Rider) with no ReSharper/.NET-backend
# half — see src/Rider/CONTRIBUTING.md. The LSP layer is built, tested, and
# published for every supported RID by the shared test-lsp.yml reusable workflow
# (see that file, and build-vscode-extension.yml / build-vs-extension.yml for the
# same pattern) — this workflow calls it once via `lsp:` and reuses its
# `server-<rid>` artifacts rather than re-publishing the server itself.
#
# Gradle never invokes `dotnet` in CI: -PlspServerBuildDir tells build.gradle.kts's
# prepareSandbox task to bundle the already-downloaded server-<rid> directories
# directly instead of running its local-dev-only publishServer task (see that file
# for the full explanation, and build-vs-extension.yml's UseExternalLspServerBuild
# / LspServerBuildDir MSBuild properties for the equivalent pattern on the VS
# side).
#
# Unlike the VS extension (Windows-only, one RID), Rider runs on every desktop
# OS, so the plugin bundles all four RIDs into one universal .zip and picks the
# right one at runtime (ReqnrollServerPathResolver.currentRid()) — the same
# approach the VS Code .vsix uses. Each RID is downloaded to an explicit path
# below rather than via a single `pattern: server-*` download: with
# merge-multiple left at its default (false), actions/download-artifact@v4
# nests pattern-matched artifacts one level deeper, under a directory named
# after the artifact itself (server-<rid>/<files>) rather than the bare RID —
# downloading each one explicitly by name avoids that extra nesting level ending
# up inside the plugin.
#
# The Gradle wrapper jar isn't committed (binary blob, see CONTRIBUTING.md) — CI
# bootstraps it from the runner's preinstalled `gradle` the same way a local dev
# container would, then uses ./gradlew for everything else.
# ---------------------------------------------------------------------------
name: Build Rider Plugin

on:
  push:
    branches:
      - 'main'
    paths:
      - 'src/LSP/**'
      - 'src/Rider/**'
      - '.github/workflows/build-rider-plugin.yml'
      - '.github/workflows/test-lsp.yml'
  pull_request:
    paths:
      - 'src/LSP/**'
      - 'src/Rider/**'
      - '.github/workflows/build-rider-plugin.yml'
      - '.github/workflows/test-lsp.yml'
  workflow_dispatch:

env:
  RIDER_DIR: src/Rider
  GRADLE_BOOTSTRAP_VERSION: '8.10'

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build + test the LSP layer, and publish self-contained server
  # binaries for every supported RID. See test-lsp.yml.
  # ---------------------------------------------------------------------------
  lsp:
    name: LSP
    uses: ./.github/workflows/test-lsp.yml

  # ---------------------------------------------------------------------------
  # Job 2: Plugin build — bundles the server binaries published by the lsp job
  # for every RID and produces the plugin .zip, then runs the Plugin Verifier
  # against it.
  # ---------------------------------------------------------------------------
  build-rider-plugin:
    name: Build Plugin
    needs: [lsp]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Bootstrap Gradle wrapper
        # See src/Rider/CONTRIBUTING.md — the wrapper jar isn't committed since it's
        # a binary blob; ubuntu-latest ships a system `gradle` for exactly this step.
        run: gradle wrapper --gradle-version ${{ env.GRADLE_BOOTSTRAP_VERSION }}
        working-directory: ${{ env.RIDER_DIR }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('src/Rider/**/*.gradle.kts', 'src/Rider/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Download server (win-x64)
        uses: actions/download-artifact@v4
        with:
          name: server-win-x64
          path: ${{ env.RIDER_DIR }}/downloaded-server/win-x64

      - name: Download server (linux-x64)
        uses: actions/download-artifact@v4
        with:
          name: server-linux-x64
          path: ${{ env.RIDER_DIR }}/downloaded-server/linux-x64

      - name: Download server (osx-x64)
        uses: actions/download-artifact@v4
        with:
          name: server-osx-x64
          path: ${{ env.RIDER_DIR }}/downloaded-server/osx-x64

      - name: Download server (osx-arm64)
        uses: actions/download-artifact@v4
        with:
          name: server-osx-arm64
          path: ${{ env.RIDER_DIR }}/downloaded-server/osx-arm64

      - name: Build plugin
        run: ./gradlew buildPlugin -PlspServerBuildDir="${{ github.workspace }}/${{ env.RIDER_DIR }}/downloaded-server"
        working-directory: ${{ env.RIDER_DIR }}

      - name: Verify plugin
        run: ./gradlew verifyPlugin -PlspServerBuildDir="${{ github.workspace }}/${{ env.RIDER_DIR }}/downloaded-server"
        working-directory: ${{ env.RIDER_DIR }}

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: reqnroll-ide-support-rider-plugin
          path: ${{ env.RIDER_DIR }}/build/distributions/*.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 3: Kotlin unit tests. Runs independently of the lsp job/server bundling
  # — nothing under src/Rider launches the LSP server yet (see
  # src/Rider/CONTRIBUTING.md); once a functional test does, give it its own
  # job that depends on `lsp` and downloads the server the same way
  # build-rider-plugin does above.
  # ---------------------------------------------------------------------------
  test-rider-plugin:
    name: Unit Tests (Rider Plugin)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Bootstrap Gradle wrapper
        run: gradle wrapper --gradle-version ${{ env.GRADLE_BOOTSTRAP_VERSION }}
        working-directory: ${{ env.RIDER_DIR }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('src/Rider/**/*.gradle.kts', 'src/Rider/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Test
        run: ./gradlew test
        working-directory: ${{ env.RIDER_DIR }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rider-plugin-test-results
          path: ${{ env.RIDER_DIR }}/build/test-results/**/*.xml
          if-no-files-found: ignore
