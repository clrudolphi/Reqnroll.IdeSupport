# ---------------------------------------------------------------------------
# build-vscode-extension.yml — CI pipeline for the Reqnroll VS Code extension.
#
# The LSP server publish and VS Code extension packaging are intentionally
# kept as separate jobs so each can be verified independently.
# ---------------------------------------------------------------------------
name: Build VS Code Extension

on:
  push:
    branches:
      - 'main'
    paths:
      - 'src/LSP/**'
      - 'src/VSCode/**'
      - '.github/workflows/build-vscode-extension.yml'
  pull_request:
    paths:
      - 'src/LSP/**'
      - 'src/VSCode/**'
      - '.github/workflows/build-vscode-extension.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22.x'
  SERVER_PROJECT: src/LSP/Reqnroll.IdeSupport.LSP.Server/Reqnroll.IdeSupport.LSP.Server.csproj
  CONNECTOR_PROJECT: src/LSP/Reqnroll.IdeSupport.LSP.Connector/Connector/Connector.csproj
  VSCODE_DIR: src/VSCode

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Standalone server publish — produces self-contained binaries for
  # all target platforms.  The extension job consumes these as artifacts.
  # ---------------------------------------------------------------------------
  publish-server:
    name: Publish LSP Server
    strategy:
      matrix:
        rid: [win-x64, linux-x64, osx-x64, osx-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Connector (${{ matrix.rid }})
        run: dotnet restore ${{ env.CONNECTOR_PROJECT }} --runtime ${{ matrix.rid }} --nologo

      - name: Publish server (${{ matrix.rid }})
        run: |
          dotnet publish ${{ env.SERVER_PROJECT }} \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            --output "publish/${{ matrix.rid }}"

      - name: Upload server artifact (${{ matrix.rid }})
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 2: Extension build — compiles TypeScript, bundles server binaries,
  # and produces the .vsix package.
  # ---------------------------------------------------------------------------
  build-extension:
    name: Build VSIX
    needs: [publish-server]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.VSCODE_DIR }}/package-lock.json

      - name: Download server artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: server-*
          path: ${{ env.VSCODE_DIR }}/server/
          merge-multiple: false
        # The download creates server/win-x64/, server/linux-x64/, etc.

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.VSCODE_DIR }}

      - name: Compile TypeScript
        run: npm run compile
        working-directory: ${{ env.VSCODE_DIR }}

      - name: Lint
        run: npm run lint
        working-directory: ${{ env.VSCODE_DIR }}

      - name: Validate semantic token scopes
        run: npm run validate:tokens
        working-directory: ${{ env.VSCODE_DIR }}

      - name: Prettier check
        run: npm run format:check
        working-directory: ${{ env.VSCODE_DIR }}

      - name: Package VSIX
        run: npx @vscode/vsce package --out "reqnroll-ide-support-${{ github.sha }}.vsix"
        working-directory: ${{ env.VSCODE_DIR }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: reqnroll-ide-support-vsix
          path: ${{ env.VSCODE_DIR }}/reqnroll-ide-support-*.vsix
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 3: TypeScript only (fast path for quick-checks on unrelated changes)
  # ---------------------------------------------------------------------------
  tsc-only:
    name: TypeScript Compile (server skip)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.VSCODE_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.VSCODE_DIR }}

      - name: Compile TypeScript
        run: npm run compile
        working-directory: ${{ env.VSCODE_DIR }}

      - name: Lint
        run: npm run lint
        working-directory: ${{ env.VSCODE_DIR }}

      - name: Validate semantic token scopes
        run: npm run validate:tokens
        working-directory: ${{ env.VSCODE_DIR }}

      - name: Prettier check
        run: npm run format:check
        working-directory: ${{ env.VSCODE_DIR }}
