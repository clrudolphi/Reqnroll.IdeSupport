# ---------------------------------------------------------------------------
# build-vscode-extension.yml — CI pipeline for the Reqnroll VS Code extension.
#
# The LSP layer is built, tested, and published for every supported RID by
# the shared test-lsp.yml reusable workflow (see that file) — this workflow
# calls it once via `lsp:` and reuses its `server-<rid>` artifacts rather than
# re-publishing the server itself, so a change here waits on the same LSP
# gate build-vs-extension.yml uses instead of duplicating the LSP build.
# ---------------------------------------------------------------------------
name: Build VS Code Extension

on:
  push:
    branches:
      - 'main'
    paths:
      - 'src/LSP/**'
      - 'src/VSCode/**'
      - '.github/workflows/build-vscode-extension.yml'
      - '.github/workflows/test-lsp.yml'
  pull_request:
    paths:
      - 'src/LSP/**'
      - 'src/VSCode/**'
      - '.github/workflows/build-vscode-extension.yml'
      - '.github/workflows/test-lsp.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '22.x'
  VSCODE_DIR: src/VSCode

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build + test the LSP layer, and publish self-contained server
  # binaries for every supported RID. See test-lsp.yml.
  # ---------------------------------------------------------------------------
  lsp:
    name: LSP
    uses: ./.github/workflows/test-lsp.yml

  # ---------------------------------------------------------------------------
  # Job 2: Extension build — compiles TypeScript, bundles the server binaries
  # published by the lsp job, and produces the .vsix package.
  # ---------------------------------------------------------------------------
  build-extension:
    name: Build VSIX
    needs: [lsp]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.VSCODE_DIR }}/package-lock.json

      - name: Download server artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: server-*
          path: ${{ env.VSCODE_DIR }}/server/
          merge-multiple: false
        # The download creates server/win-x64/, server/linux-x64/, etc.

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.VSCODE_DIR }}

      - name: Compile TypeScript
        run: npm run compile
        working-directory: ${{ env.VSCODE_DIR }}

      - name: Lint
        run: npm run lint
        working-directory: ${{ env.VSCODE_DIR }}

      - name: Validate semantic token scopes
        run: npm run validate:tokens
        working-directory: ${{ env.VSCODE_DIR }}

      - name: Prettier check
        run: npm run format:check
        working-directory: ${{ env.VSCODE_DIR }}

      - name: Package VSIX
        run: npx @vscode/vsce package --out "reqnroll-ide-support-${{ github.sha }}.vsix"
        working-directory: ${{ env.VSCODE_DIR }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: reqnroll-ide-support-vsix
          path: ${{ env.VSCODE_DIR }}/reqnroll-ide-support-*.vsix
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 3: TypeScript only (fast path for quick-checks on unrelated changes)
  # ---------------------------------------------------------------------------
  tsc-only:
    name: TypeScript Compile (server skip)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.VSCODE_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.VSCODE_DIR }}

      - name: Compile TypeScript
        run: npm run compile
        working-directory: ${{ env.VSCODE_DIR }}

      - name: Lint
        run: npm run lint
        working-directory: ${{ env.VSCODE_DIR }}

      - name: Validate semantic token scopes
        run: npm run validate:tokens
        working-directory: ${{ env.VSCODE_DIR }}

      - name: Prettier check
        run: npm run format:check
        working-directory: ${{ env.VSCODE_DIR }}
