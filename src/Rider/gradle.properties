# Plugin identity
pluginGroup = com.reqnroll.ide.rider
# Marketplace plugin ID -- deliberately does NOT contain "rider": JetBrains' Plugin Verifier
# rejects IDs containing the target IDE's name ("The plugin ID ... should not include the word
# 'rider'"), caught by ./gradlew verifyPlugin. Kept separate from pluginGroup (Gradle coordinate,
# unrestricted) and the com.reqnroll.ide.rider Kotlin package name (also unrestricted).
pluginId = com.reqnroll.idesupport
pluginName = reqnroll-ide-support-rider
pluginVersion = 0.1.0

# Compatibility range — bump alongside platformVersion when targeting a new Rider release.
pluginSinceBuild = 243
pluginUntilBuild = 251.*

# IntelliJ Platform Gradle Plugin coordinates (see build.gradle.kts).
# "RD" selects the Rider platform artifact; platformVersion pins the exact Rider build
# the plugin compiles/runs against during development (`./gradlew runIde`).
platformType = RD
platformVersion = 2024.3.5

kotlin.stdlib.default.dependency = false
org.gradle.jvmargs = -Xmx2g
